name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Prisma client (api typecheck @prisma/client tiplerine bağımlı).
      - run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  docker:
    name: docker build (no push)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build voice-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/voice-service/Dockerfile
          push: false
          tags: voice-service:ci

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: voice-api:ci
